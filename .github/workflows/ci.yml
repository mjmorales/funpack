name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # arduino/setup-task has no Node 24 release yet; force it forward ahead of
  # the runner default flipping on 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  odin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-05
      - name: Build (type-check)
        run: task funpack:build runtime:build
      - name: Lint (vet + strict style)
        run: task funpack:lint runtime:lint runtime:lint-live
      - name: Test
        run: task funpack:test runtime:test
