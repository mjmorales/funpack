name: MCP Release

# Conventional-commit auto-release for the funpack-mcp Go module (mcp/), versioned
# INDEPENDENTLY of the toolchain binary (`v*`) and the Claude Code plugin
# (`plugin-v*`). This is the `funpack-mcp-v*` line. Each of the three release lines
# scopes its trigger, its commit analysis, and its `git describe` to a disjoint set
# of paths/tags, so a push only ever cuts the release(s) it actually touched.
#
# The latest `funpack-mcp-v*` tag is the authoritative current version — mcp carries
# no committed VERSION mirror; the version is injected into internal/buildinfo at
# build time via -ldflags. The job derives the next semver from mcp-scoped
# conventional commits, prepends mcp/CHANGELOG.md, then commits + tags
# (`funpack-mcp-vX.Y.Z`) + pushes via the release App (the App is a bypass actor on
# the protected `main` ruleset, so the `chore(mcp-release) [skip ci]` commit pushes
# past the required checks that never run on a [skip ci] commit). The [skip ci]
# marker also stops the pushed commit from re-triggering this workflow — no loop.
#
# `build` cross-compiles the pure-Go module (no CGO) for every target from a single
# runner — GOOS/GOARCH cross-compilation yields native per-arch binaries without
# flaky native runners. `bump-tap` regenerates Formula/funpack-mcp.rb in
# mjmorales/homebrew-tap (no SDL2 dependency, unlike the funpack binary).
# Reuses the funpack RELEASE_APP_* and HOMEBREW_TAP_TOKEN secrets.
# Managed by OpenTofu (cloud-infra github/files/funpack-mcp-release.yml); edit there.

on:
  push:
    branches: [main]
    # Only mcp module changes cut an mcp release. The binary line ignores mcp/**
    # and the plugin line is scoped to plugins/**, so the three never collide.
    paths:
      - 'mcp/**'

permissions:
  contents: write # cut the tag + create the release + upload assets

concurrency:
  # Shared with the binary + plugin release lines so no two push to main at once.
  # Each fetch+rebases before pushing (disjoint file sets -> clean rebase).
  group: funpack-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: cut mcp version + tag
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.bump.outputs.skip }}
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: funpack-mcp-v${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for tag detection + changelog range
          # Don't persist the default GITHUB_TOKEN as a git auth header — the
          # release push must authenticate as the release App (the ruleset bypass
          # actor) via the App-token URL set in the push step.
          persist-credentials: false

      - name: Determine version bump
        id: bump
        run: |
          # The latest funpack-mcp-v* tag is the authoritative current version;
          # the binary v* and plugin plugin-v* tags are invisible to this match.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'funpack-mcp-v*' 2>/dev/null || echo "")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$LATEST_TAG" ]; then CURRENT="0.0.0"; else CURRENT="${LATEST_TAG#funpack-mcp-v}"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze only commits that TOUCHED mcp/, so a mixed push bumps this
          # line by its own changes alone.
          PATHS=(mcp)
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b" HEAD -- "${PATHS[@]}")
          else
            COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD" -- "${PATHS[@]}")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bump type from conventional commits: `!`/BREAKING -> major,
          # feat -> minor, fix/docs/refactor/perf/style/build -> patch.
          # chore/ci/test alone -> no release.
          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|docs|refactor|perf|style|build)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST_TAG="${{ steps.bump.outputs.latest_tag }}"
          if [ -z "$LATEST_TAG" ]; then RANGE="HEAD"; else RANGE="${LATEST_TAG}..HEAD"; fi
          PATHS=(mcp)

          {
            echo "changelog<<CHANGELOG_EOF"

            BREAKING=$(git log --pretty=format:"%s" "$RANGE" -- "${PATHS[@]}" | grep -iE "^[a-z]+(\(.+\))?!:" || true)
            BREAKING_BODY=$(git log --pretty=format:"%b" "$RANGE" -- "${PATHS[@]}" | grep -A1 "BREAKING CHANGE:" | grep -v "^--$" || true)
            if [ -n "$BREAKING" ] || [ -n "$BREAKING_BODY" ]; then
              echo "### Breaking Changes"
              [ -n "$BREAKING" ] && echo "$BREAKING" | sed 's/^/- /'
              [ -n "$BREAKING_BODY" ] && echo "$BREAKING_BODY" | sed 's/^/- /'
              echo ""
            fi

            FEATURES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- "${PATHS[@]}" | grep -E "^- feat" || true)
            if [ -n "$FEATURES" ]; then echo "### Features"; echo "$FEATURES"; echo ""; fi

            FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- "${PATHS[@]}" | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then echo "### Fixes"; echo "$FIXES"; echo ""; fi

            OTHER=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- "${PATHS[@]}" | grep -E "^- (docs|refactor|perf|style|build)" || true)
            if [ -n "$OTHER" ]; then echo "### Other"; echo "$OTHER"; echo ""; fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update mcp/CHANGELOG.md
        if: steps.bump.outputs.skip != 'true'
        env:
          # Pass via env (not ${{ }} shell interpolation) so backticks, $(), and
          # other shell-active characters in commit subjects stay literal.
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          CL=mcp/CHANGELOG.md
          [ -f "$CL" ] || printf '# Changelog\n\nAll notable changes to funpack-mcp.\n\n' > "$CL"
          DATE=$(date -u +%Y-%m-%d)
          ENTRY=$(printf "## [%s] - %s\n\n%s" "$NEW_VERSION" "$DATE" "$CHANGELOG")
          INSERT_LINE=$(grep -n "^## \[" "$CL" | head -1 | cut -d: -f1)
          if [ -n "$INSERT_LINE" ]; then
            head -n $((INSERT_LINE - 1)) "$CL" > "$CL.tmp"
            printf '%s\n\n' "$ENTRY" >> "$CL.tmp"
            tail -n +"${INSERT_LINE}" "$CL" >> "$CL.tmp"
          else
            cp "$CL" "$CL.tmp"
            printf '\n%s\n' "$ENTRY" >> "$CL.tmp"
          fi
          cat -s "$CL.tmp" > "$CL"
          rm -f "$CL.tmp"

      - name: Generate App token
        id: app-token
        if: steps.bump.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Commit, tag, and push
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git add mcp/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG already current, skipping commit."
          else
            git commit -m "chore(mcp-release): funpack-mcp-v${NEW_VERSION} [skip ci]"
          fi
          # Absorb any commit a sibling release line landed first (disjoint files ->
          # clean rebase), THEN tag so the tag points at the rebased commit that
          # actually lands on main, then push the mcp commit + tag.
          git fetch origin main
          git rebase origin/main
          git tag "funpack-mcp-v${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: funpack-mcp-v${{ steps.bump.outputs.new_version }}
          name: funpack-mcp-v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  build:
    name: build ${{ matrix.plat }}
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Pure Go (no CGO) cross-compiles every target from this one runner.
        include:
          - { goos: darwin, goarch: arm64, plat: macos-arm64 }
          - { goos: linux,  goarch: arm64, plat: linux-arm64 }
          - { goos: linux,  goarch: amd64, plat: linux-x64 }
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the freshly-cut tag, not the main HEAD the push event points at.
          ref: ${{ needs.release.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod
          cache-dependency-path: mcp/go.sum
      - name: Build + package
        working-directory: mcp
        env:
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.new_version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PKG=github.com/mjmorales/funpack/mcp/internal/buildinfo
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}"
          dist="funpack-mcp-${TAG}-${{ matrix.plat }}"
          mkdir -p "$dist"
          go build -trimpath -ldflags "$LDFLAGS" -o "$dist/funpack-mcp" .
          cp README.md "$dist"/ 2>/dev/null || true
          tar -czf "${dist}.tar.gz" "$dist"
          echo "ASSET=mcp/${dist}.tar.gz" >> "$GITHUB_ENV"
      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After every platform tarball is attached, hash them and regenerate the Homebrew
  # formula (version + per-platform url/sha256) in mjmorales/homebrew-tap. The mcp
  # binary is pure Go, so the formula has no runtime dependency (unlike funpack.rb,
  # which depends on sdl2). HOMEBREW_TAP_TOKEN is the fine-grained PAT shared across
  # the tap-publishing workflows (managed in cloud-infra workflows.tf).
  bump-tap:
    name: bump homebrew formula
    needs: [release, build]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download release tarballs and hash them
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p '*.tar.gz' -D dist
          for plat in macos-arm64 linux-arm64 linux-x64; do
            sha="$(sha256sum "dist/funpack-mcp-${TAG}-${plat}.tar.gz" | awk '{print $1}')"
            echo "${plat//-/_}=$sha" >> "$GITHUB_OUTPUT"
          done
      - name: Check out the Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: mjmorales/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Regenerate Formula/funpack-mcp.rb
        env:
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.new_version }}
          SHA_MAC_ARM: ${{ steps.sha.outputs.macos_arm64 }}
          SHA_LNX_ARM: ${{ steps.sha.outputs.linux_arm64 }}
          SHA_LNX_X64: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          cat > tap/Formula/funpack-mcp.rb <<EOF
          class FunpackMcp < Formula
            desc "Model Context Protocol server for the funpack toolchain"
            homepage "https://github.com/mjmorales/funpack"
            version "${VERSION}"

            on_macos do
              # Apple Silicon only — funpack-mcp publishes no Intel macOS build.
              on_arm do
                url "${base}/funpack-mcp-${TAG}-macos-arm64.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/funpack-mcp-${TAG}-linux-arm64.tar.gz"
                sha256 "${SHA_LNX_ARM}"
              end
              on_intel do
                url "${base}/funpack-mcp-${TAG}-linux-x64.tar.gz"
                sha256 "${SHA_LNX_X64}"
              end
            end

            def install
              bin.install "funpack-mcp"
            end

            test do
              assert_match "funpack-mcp", shell_output("#{bin}/funpack-mcp version")
            end
          end
          EOF
          ruby -c tap/Formula/funpack-mcp.rb
      - name: Commit and push the bump
        run: |
          cd tap
          if git diff --quiet; then
            echo "Formula already at this version; nothing to push."
            exit 0
          fi
          git config user.name "funpack-release"
          git config user.email "actions@users.noreply.github.com"
          git add Formula/funpack-mcp.rb
          git commit -m "funpack-mcp ${{ needs.release.outputs.new_version }} (formula bump from ${{ needs.release.outputs.tag }})"
          git push
