name: Release

# Conventional-commit auto-release on every push to main (mirrors blocko).
# The `release` job derives the next semver from the commits since the latest
# tag, prepends CHANGELOG.md, then commits + tags + pushes via the release App
# (the App is a bypass actor on the protected `main` ruleset, so the
# `chore(release) [skip ci]` commit pushes past the required odin/go checks
# that never run on a [skip ci] commit). The [skip ci] marker also stops the
# pushed release commit from re-triggering this workflow — no loop.
#
# `build` then compiles the SINGLE funpack binary at the freshly-cut tag and
# `bump-tap` rewrites the Homebrew formula:
#   funpack — the consolidated compiler + runtime in one executable, built with
#             FUNPACK_LIVE (links vendor:sdl2; needs SDL2 at runtime, declared as a
#             Homebrew dependency). The two-binary split (funpack + funpack-live) is gone.
# Native matrix runners per OS/arch (no cross-compile — SDL2 links natively per arch).
#
# This is the BINARY release line (`v*`). The Claude Code plugin under plugins/
# is versioned independently on the `plugin-v*` line by funpack-plugin-release.yml;
# the paths-ignore below + the `--match 'v*'` tag scoping + the `:(exclude)`
# pathspecs keep the two lines from cutting each other's releases.
# Managed by OpenTofu (cloud-infra github/files/funpack-release.yml); edit the source there.

on:
  push:
    branches: [main]
    # Plugin-only changes cut a plugin release, not a binary one. The plugin
    # workflow's `paths:` is the exact complement of this list.
    paths-ignore:
      - 'plugins/**'
      - '.claude-plugin/**'

permissions:
  contents: write   # cut the tag + create the release + upload assets

concurrency:
  # Serialize releases so two quick main pushes can't race the tag/version.
  group: funpack-release
  cancel-in-progress: false

env:
  # arduino/setup-task has no Node 24 release yet; force it forward ahead of
  # the runner default flipping (mirrors funpack-ci.yml).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: cut version + tag
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.bump.outputs.skip }}
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: v${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for tag detection + changelog range
          # Don't persist the default GITHUB_TOKEN as a git auth header — the
          # release push must authenticate as the release App (the ruleset
          # bypass actor) via the App-token URL set in the push step. A
          # persisted default-token header would win and the push would be
          # rejected by the required odin/go checks.
          persist-credentials: false

      - name: Determine version bump
        id: bump
        run: |
          # The latest BINARY tag is the authoritative current version. `--match
          # 'v*'` excludes the plugin line's `plugin-v*` tags so the two never
          # cross-contaminate.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Exclude the plugin artifact paths so a mixed push (source + plugin)
          # bumps the binary line only by its non-plugin commits.
          EXCLUDES=(':(exclude)plugins' ':(exclude).claude-plugin')
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b" HEAD -- . "${EXCLUDES[@]}")
          else
            COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD" -- . "${EXCLUDES[@]}")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bump type from conventional commits: `!`/BREAKING -> major,
          # feat -> minor, fix/docs/refactor/perf/style/build -> patch.
          # chore/ci/test alone -> no release.
          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|docs|refactor|perf|style|build)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST_TAG="${{ steps.bump.outputs.latest_tag }}"
          if [ "$LATEST_TAG" = "v0.0.0" ]; then RANGE="HEAD"; else RANGE="${LATEST_TAG}..HEAD"; fi
          # Match the bump step: keep plugin commits out of the binary changelog.
          EXCLUDES=(':(exclude)plugins' ':(exclude).claude-plugin')

          {
            echo "changelog<<CHANGELOG_EOF"

            BREAKING=$(git log --pretty=format:"%s" "$RANGE" -- . "${EXCLUDES[@]}" | grep -iE "^[a-z]+(\(.+\))?!:" || true)
            BREAKING_BODY=$(git log --pretty=format:"%b" "$RANGE" -- . "${EXCLUDES[@]}" | grep -A1 "BREAKING CHANGE:" | grep -v "^--$" || true)
            if [ -n "$BREAKING" ] || [ -n "$BREAKING_BODY" ]; then
              echo "### Breaking Changes"
              [ -n "$BREAKING" ] && echo "$BREAKING" | sed 's/^/- /'
              [ -n "$BREAKING_BODY" ] && echo "$BREAKING_BODY" | sed 's/^/- /'
              echo ""
            fi

            FEATURES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- feat" || true)
            if [ -n "$FEATURES" ]; then echo "### Features"; echo "$FEATURES"; echo ""; fi

            FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then echo "### Fixes"; echo "$FIXES"; echo ""; fi

            OTHER=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- (docs|refactor|perf|style|build)" || true)
            if [ -n "$OTHER" ]; then echo "### Other"; echo "$OTHER"; echo ""; fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        if: steps.bump.outputs.skip != 'true'
        env:
          # Pass via env (not ${{ }} shell interpolation) so backticks, $(),
          # and other shell-active characters in commit subjects stay literal.
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ENTRY=$(printf "## [%s] - %s\n\n%s" "$NEW_VERSION" "$DATE" "$CHANGELOG")
          INSERT_LINE=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -n "$INSERT_LINE" ]; then
            head -n $((INSERT_LINE - 1)) CHANGELOG.md > CHANGELOG.tmp
            # Trailing blank line guarantees one empty line before the next
            # version block (cat -s below collapses any accidental doubles).
            printf '%s\n\n' "$ENTRY" >> CHANGELOG.tmp
            tail -n +"${INSERT_LINE}" CHANGELOG.md >> CHANGELOG.tmp
          else
            cp CHANGELOG.md CHANGELOG.tmp
            printf '\n%s\n' "$ENTRY" >> CHANGELOG.tmp
          fi
          # Normalize spacing: collapse any run of blank lines to exactly one.
          cat -s CHANGELOG.tmp > CHANGELOG.md
          rm -f CHANGELOG.tmp

      - name: Write VERSION mirror
        # The repo-root VERSION file is the committed mirror of the cut tag that
        # the funpack binary embeds at compile time (#load, funpack/version.odin)
        # so `funpack version` reports the release it was built at. It is written
        # ONLY here — humans never hand-edit it; the tag stays the source of
        # truth and this keeps the file in lockstep. Committed in the same
        # `chore(release)` commit below, so the build job (which checks out the
        # cut tag) embeds the matching version.
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: printf '%s\n' "$NEW_VERSION" > VERSION

      - name: Generate App token
        id: app-token
        # Only real releases need to push past the protected `main` ruleset
        # (the release commit carries [skip ci], so the required odin/go checks
        # never run on it — github-actions[bot] can't bypass that, but the
        # release App can). Skipped runs never reach this step, so a no-op
        # push needs no secrets.
        if: steps.bump.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Commit, tag, and push
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git add CHANGELOG.md VERSION
          if git diff --cached --quiet; then
            echo "CHANGELOG and VERSION already current, skipping commit."
          else
            git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          fi
          # Absorb any commit the plugin release landed first (disjoint files ->
          # clean rebase), THEN tag so the tag points at the rebased commit that
          # actually lands on main, then push the binary commit + tag.
          git fetch origin main
          git rebase origin/main
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  build:
    name: build ${{ matrix.os }}-${{ matrix.arch }}
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Intel macOS (macos-13 / x64) is intentionally omitted: GitHub's Intel
        # runners queue for hours, and Apple Silicon covers modern Macs.
        include:
          - { runner: ubuntu-latest,    os: linux, arch: x64 }
          - { runner: ubuntu-24.04-arm, os: linux, arch: arm64 }
          - { runner: macos-latest,     os: macos, arch: arm64 }
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the freshly-cut tag, not the main HEAD the push event points
          # at (under a branch trigger GITHUB_REF_NAME is `main`, not the tag).
          ref: ${{ needs.release.outputs.tag }}
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-05
      - name: Install SDL2 (the runtime links vendor:sdl2)
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y libsdl2-dev
          else
            brew install sdl2
          fi
      - name: Prepare Odin flake retry wrapper
        # The pinned Odin dev-2026-05 typechecker crashes nondeterministically
        # (check_type.cpp 'tuple != nullptr', exit 133) before codegen; identical
        # trees pass on re-run. Retry ONCE on exit 133 only — every other code
        # propagates unretried. Remove when the pin moves past the upstream fix.
        # (mirrors funpack-ci.yml)
        run: |
          cat > "$RUNNER_TEMP/retry-odin.sh" <<'SH'
          #!/usr/bin/env bash
          set -uo pipefail
          "$@"
          code=$?
          if [ "$code" -ne 133 ]; then exit "$code"; fi
          echo "::warning::odin exited 133 (known dev-2026-05 typechecker flake) - retrying once"
          exec "$@"
          SH
          chmod +x "$RUNNER_TEMP/retry-odin.sh"
      - name: Build funpack (single binary, compiler + runtime, FUNPACK_LIVE + SDL2)
        working-directory: cmd/funpack
        run: '"$RUNNER_TEMP/retry-odin.sh" odin build . -define:FUNPACK_LIVE=true -out:funpack'
      - name: Package
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          dist="funpack-${TAG}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$dist"
          cp cmd/funpack/funpack "$dist"/
          cp README.md LICENSE "$dist"/ 2>/dev/null || true
          tar -czf "${dist}.tar.gz" "$dist"
          echo "ASSET=${dist}.tar.gz" >> "$GITHUB_ENV"
      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

  # After every platform tarball is attached, hash them and rewrite the
  # Homebrew formula (version + per-platform url/sha256) in mjmorales/homebrew-tap,
  # pushing the bump directly to its main. HOMEBREW_TAP_TOKEN is the fine-grained
  # PAT (managed in cloud-infra workflows.tf, shared with claude-env/keel).
  bump-tap:
    name: bump homebrew formula
    needs: [release, build]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version from the cut tag
        id: ver
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"
      - name: Download release tarballs and hash them
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p '*.tar.gz' -D dist
          for plat in macos-arm64 linux-arm64 linux-x64; do
            sha="$(sha256sum "dist/funpack-${TAG}-${plat}.tar.gz" | awk '{print $1}')"
            echo "${plat//-/_}=$sha" >> "$GITHUB_OUTPUT"
          done
      - name: Check out the Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: mjmorales/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Rewrite Formula/funpack.rb
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA_MAC_ARM: ${{ steps.sha.outputs.macos_arm64 }}
          SHA_LNX_ARM: ${{ steps.sha.outputs.linux_arm64 }}
          SHA_LNX_X64: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          ruby -e '
            f   = "tap/Formula/funpack.rb"
            s   = File.read(f)
            ver = ENV["VERSION"]; tag = ENV["TAG"]
            s.sub!(/version "[^"]*"/, %Q{version "#{ver}"})
            [
              ["macos-arm64", ENV["SHA_MAC_ARM"]],
              ["linux-arm64", ENV["SHA_LNX_ARM"]],
              ["linux-x64",   ENV["SHA_LNX_X64"]],
            ].each do |plat, sha|
              url = "https://github.com/mjmorales/funpack/releases/download/#{tag}/funpack-#{tag}-#{plat}.tar.gz"
              s.sub!(/url "[^"]*-#{plat}\.tar\.gz"(\s*\n\s*)sha256 "[0-9a-f]*"/m) { %Q{url "#{url}"#{$1}sha256 "#{sha}"} }
            end
            File.write(f, s)
          '
          git -C tap --no-pager diff
      - name: Commit and push the bump
        run: |
          cd tap
          if git diff --quiet; then
            echo "Formula already at this version; nothing to push."
            exit 0
          fi
          git config user.name "funpack-release"
          git config user.email "actions@users.noreply.github.com"
          git add Formula/funpack.rb
          git commit -m "funpack ${{ steps.ver.outputs.version }} (formula bump from ${{ steps.ver.outputs.tag }})"
          git push
