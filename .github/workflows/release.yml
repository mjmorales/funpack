name: CI / Release

# Single ordered pipeline (managed by OpenTofu — edit the source at
# cloud-infra github/files/funpack-release.yml). Replaces the old THREE parallel
# workflows (CI, Release, Plugin Release) that raced on every push to main.
#
# On a push to main the stages run as ONE gated chain:
#   build -> lint -> test -> release -> build-binaries -> bump-tap
# each job `needs:` the prior, so a failure at the head halts everything
# downstream — nothing is cut, tagged, built, or published unless the tests and
# lints pass first. On a pull_request only build + lint + test run.
#
# The `release` job cuts BOTH version lines in ONE job and ONE atomic push:
#   - binary  v*         (CHANGELOG.md + VERSION)
#   - plugin  plugin-v*  (plugins/** + .claude-plugin/**)
# Each line analyses only its own path-scoped commits, so a push touching just
# one line cuts only that line. Folding both into one push means the two can
# NEVER race the way two separate workflows did.
#
# The release commits carry [skip ci], so the pushed chore(release) commits do
# not re-trigger this workflow (no loop) and the required build/lint/test checks
# never run on them — the release App (a bypass actor on the protected main
# ruleset) pushes them past the required checks. github-actions[bot] cannot
# bypass, which is why the push authenticates as the App via the App-token URL
# and the checkout uses persist-credentials: false.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    # Cut a release on demand even when no qualifying conventional commit exists
    # (e.g. ship an already-committed corpus restamp — FRICTION F15). Each input
    # forces that line's bump level; 'none' (the default) leaves the line to its
    # normal commit-driven detection, so a dispatch can cut one line, both, or
    # (both 'none') nothing.
    inputs:
      binary_bump:
        description: Force a binary (v*) release at this level
        type: choice
        default: none
        options: [none, patch, minor, major]
      plugin_bump:
        description: Force a plugin (plugin-v*) release at this level
        type: choice
        default: none
        options: [none, patch, minor, major]

permissions:
  contents: read

concurrency:
  # All main pushes share one group with cancel-in-progress OFF, so two quick
  # pushes serialize instead of racing the tag/version. PR runs cancel their own
  # superseded runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # arduino/setup-task has no Node 24 release yet; force it forward ahead of the
  # runner default flipping.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-05
      - name: Prepare Odin flake retry wrapper
        # The pinned Odin dev-2026-05 typechecker crashes nondeterministically
        # (check_type.cpp:598 'tuple != nullptr', exit 133) before any work runs;
        # identical trees pass on re-run. Retry ONCE on exit 133 only — every
        # other exit code propagates unretried, so real failures never get a
        # second shot. Remove when the pin moves past the upstream fix.
        run: |
          cat > "$RUNNER_TEMP/retry-odin.sh" <<'SH'
          #!/usr/bin/env bash
          set -uo pipefail
          "$@"
          code=$?
          if [ "$code" -ne 133 ]; then exit "$code"; fi
          echo "::warning::odin exited 133 (known dev-2026-05 typechecker flake) - retrying once"
          exec "$@"
          SH
          chmod +x "$RUNNER_TEMP/retry-odin.sh"
      # The root aggregate verbs cover every package (cli, funpack, runtime,
      # cmd/funpack), so CI never needs editing when the package layout changes —
      # the Taskfile is the single source of truth. build type-checks the
      # cmd/funpack entry package in BOTH define modes; the SDL arm is type-checked
      # (odin check) but NOT linked, so no libsdl2 install is needed on the runner.
      - name: Build (type-check)
        run: '"$RUNNER_TEMP/retry-odin.sh" task build'

  lint:
    name: lint
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-05
      - name: Prepare Odin flake retry wrapper
        run: |
          cat > "$RUNNER_TEMP/retry-odin.sh" <<'SH'
          #!/usr/bin/env bash
          set -uo pipefail
          "$@"
          code=$?
          if [ "$code" -ne 133 ]; then exit "$code"; fi
          echo "::warning::odin exited 133 (known dev-2026-05 typechecker flake) - retrying once"
          exec "$@"
          SH
          chmod +x "$RUNNER_TEMP/retry-odin.sh"
      - name: Lint (vet + strict style)
        run: '"$RUNNER_TEMP/retry-odin.sh" task lint'

  test:
    name: test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-05
      - name: Prepare Odin flake retry wrapper
        run: |
          cat > "$RUNNER_TEMP/retry-odin.sh" <<'SH'
          #!/usr/bin/env bash
          set -uo pipefail
          "$@"
          code=$?
          if [ "$code" -ne 133 ]; then exit "$code"; fi
          echo "::warning::odin exited 133 (known dev-2026-05 typechecker flake) - retrying once"
          exec "$@"
          SH
          chmod +x "$RUNNER_TEMP/retry-odin.sh"
      - name: Test
        run: '"$RUNNER_TEMP/retry-odin.sh" task test'

  release:
    name: cut version + tag
    needs: test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cut tags + create releases
    outputs:
      bin_skip: ${{ steps.binbump.outputs.skip }}
      bin_version: ${{ steps.binbump.outputs.new_version }}
      bin_tag: v${{ steps.binbump.outputs.new_version }}
      plugin_skip: ${{ steps.pluginbump.outputs.skip }}
      plugin_version: ${{ steps.pluginbump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for tag detection + changelog range
          # Don't persist the default GITHUB_TOKEN as a git auth header — the
          # release push must authenticate as the release App (the ruleset bypass
          # actor) via the App-token URL set in the push step. A persisted
          # default-token header would win and the push would be rejected by the
          # required build/lint/test checks.
          persist-credentials: false

      # ---- Binary line (v*) ----------------------------------------------------
      - name: Determine binary version bump
        id: binbump
        run: |
          # The latest BINARY tag is the authoritative current version. `--match
          # 'v*'` excludes the plugin line's `plugin-v*` tags so the two never
          # cross-contaminate.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # A workflow_dispatch run can force this line's bump even with no
          # qualifying commit (e.g. ship an already-committed corpus restamp —
          # FRICTION F15). The manual input wins; 'none' (the default, and the
          # value on every push event) falls through to commit detection.
          FORCE="${{ github.event.inputs.binary_bump }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$FORCE" ] && [ "$FORCE" != "none" ]; then
            BUMP="$FORCE"
          else
            # Exclude the sibling-line paths (plugin) so a mixed push bumps the
            # binary line only by its own source commits.
            EXCLUDES=(':(exclude)plugins' ':(exclude).claude-plugin')
            if [ "$LATEST_TAG" = "v0.0.0" ]; then
              COMMITS=$(git log --pretty=format:"%s%n%b" HEAD -- . "${EXCLUDES[@]}")
            else
              COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD" -- . "${EXCLUDES[@]}")
            fi

            if [ -z "$COMMITS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # `!`/BREAKING -> major, feat -> minor,
            # fix/docs/refactor/perf/style/build -> patch. chore/ci/test -> none.
            BUMP="none"
            if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qE "^(fix|docs|refactor|perf|style|build)(\(.+\))?:"; then
              BUMP="patch"
            fi
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Binary bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Generate binary changelog
        id: binlog
        if: steps.binbump.outputs.skip != 'true'
        run: |
          LATEST_TAG="${{ steps.binbump.outputs.latest_tag }}"
          if [ "$LATEST_TAG" = "v0.0.0" ]; then RANGE="HEAD"; else RANGE="${LATEST_TAG}..HEAD"; fi
          EXCLUDES=(':(exclude)plugins' ':(exclude).claude-plugin')

          {
            echo "changelog<<CHANGELOG_EOF"

            BREAKING=$(git log --pretty=format:"%s" "$RANGE" -- . "${EXCLUDES[@]}" | grep -iE "^[a-z]+(\(.+\))?!:" || true)
            BREAKING_BODY=$(git log --pretty=format:"%b" "$RANGE" -- . "${EXCLUDES[@]}" | grep -A1 "BREAKING CHANGE:" | grep -v "^--$" || true)
            if [ -n "$BREAKING" ] || [ -n "$BREAKING_BODY" ]; then
              echo "### Breaking Changes"
              [ -n "$BREAKING" ] && echo "$BREAKING" | sed 's/^/- /'
              [ -n "$BREAKING_BODY" ] && echo "$BREAKING_BODY" | sed 's/^/- /'
              echo ""
            fi

            FEATURES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- feat" || true)
            if [ -n "$FEATURES" ]; then echo "### Features"; echo "$FEATURES"; echo ""; fi

            FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then echo "### Fixes"; echo "$FIXES"; echo ""; fi

            OTHER=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- (docs|refactor|perf|style|build)" || true)
            if [ -n "$OTHER" ]; then echo "### Other"; echo "$OTHER"; echo ""; fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md + VERSION (binary)
        if: steps.binbump.outputs.skip != 'true'
        env:
          # Pass via env (not ${{ }} shell interpolation) so backticks, $(), and
          # other shell-active characters in commit subjects stay literal.
          NEW_VERSION: ${{ steps.binbump.outputs.new_version }}
          CHANGELOG: ${{ steps.binlog.outputs.changelog }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ENTRY=$(printf "## [%s] - %s\n\n%s" "$NEW_VERSION" "$DATE" "$CHANGELOG")
          INSERT_LINE=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -n "$INSERT_LINE" ]; then
            head -n $((INSERT_LINE - 1)) CHANGELOG.md > CHANGELOG.tmp
            printf '%s\n\n' "$ENTRY" >> CHANGELOG.tmp
            tail -n +"${INSERT_LINE}" CHANGELOG.md >> CHANGELOG.tmp
          else
            cp CHANGELOG.md CHANGELOG.tmp
            printf '\n%s\n' "$ENTRY" >> CHANGELOG.tmp
          fi
          cat -s CHANGELOG.tmp > CHANGELOG.md
          rm -f CHANGELOG.tmp
          # The repo-root VERSION file is the committed mirror of the cut tag that
          # the funpack binary embeds at compile time (#load, funpack/version.odin)
          # so `funpack version` reports the release it was built at. Written ONLY
          # here; the tag stays the source of truth and this keeps it in lockstep.
          printf '%s\n' "$NEW_VERSION" > VERSION
          # The embedded docs corpus stamps the funpack version it was generated at,
          # and the binary #loads it from cmd/funpack/mcp/corpus/manifest.json. Restamp
          # it here so the tagged binary never embeds a corpus from an older version
          # (ADR 2026-06-19-corpus-regen-rides-version-bump / FRICTION F15). Only the
          # version stamp moves: the byte/hash corpus-pin gate already proved the shard
          # CONTENT current on the feat commits, and a full `task docs-regen` would need
          # a FUNPACK_LIVE build + SDL2 on this runner (and the v* tag does not exist yet
          # when gen-corpus would run, so spec_ref could not advance anyway), so a sed is
          # the equivalent, SDL-free path. The in-repo parity test
          # (test_corpus_pin_version_matches_compiler) is the safety net behind this.
          sed -i "s/\"funpack_version\": \"[^\"]*\"/\"funpack_version\": \"${NEW_VERSION}\"/" cmd/funpack/mcp/corpus/manifest.json

      # ---- Plugin line (plugin-v*) --------------------------------------------
      - name: Determine plugin version bump
        id: pluginbump
        run: |
          # plugin.json is the authoritative current plugin version.
          CURRENT=$(grep '"version"' plugins/funpack/.claude-plugin/plugin.json | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Latest PLUGIN tag (plugin-v*) bounds the changelog range; the binary
          # v* tags are invisible to this match, keeping the lines independent.
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'plugin-v*' 2>/dev/null || echo "")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # A workflow_dispatch run can force this line's bump even with no
          # qualifying commit. The manual input wins; 'none' (the default, and the
          # value on every push event) falls through to commit detection.
          FORCE="${{ github.event.inputs.plugin_bump }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$FORCE" ] && [ "$FORCE" != "none" ]; then
            BUMP="$FORCE"
          else
            # Analyse only commits that TOUCHED the plugin artifact paths.
            PATHS=(plugins .claude-plugin)
            if [ -z "$LATEST_TAG" ]; then
              COMMITS=$(git log --pretty=format:"%s%n%b" HEAD -- "${PATHS[@]}")
            else
              COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD" -- "${PATHS[@]}")
            fi

            if [ -z "$COMMITS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            BUMP="none"
            if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qE "^(fix|docs|refactor|perf|style|build)(\(.+\))?:"; then
              BUMP="patch"
            fi
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Plugin bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Generate plugin changelog
        id: pluginlog
        if: steps.pluginbump.outputs.skip != 'true'
        run: |
          LATEST_TAG="${{ steps.pluginbump.outputs.latest_tag }}"
          if [ -z "$LATEST_TAG" ]; then RANGE="HEAD"; else RANGE="${LATEST_TAG}..HEAD"; fi
          PATHS=(plugins .claude-plugin)

          {
            echo "changelog<<CHANGELOG_EOF"

            BREAKING=$(git log --pretty=format:"%s" "$RANGE" -- "${PATHS[@]}" | grep -iE "^[a-z]+(\(.+\))?!:" || true)
            BREAKING_BODY=$(git log --pretty=format:"%b" "$RANGE" -- "${PATHS[@]}" | grep -A1 "BREAKING CHANGE:" | grep -v "^--$" || true)
            if [ -n "$BREAKING" ] || [ -n "$BREAKING_BODY" ]; then
              echo "### Breaking Changes"
              [ -n "$BREAKING" ] && echo "$BREAKING" | sed 's/^/- /'
              [ -n "$BREAKING_BODY" ] && echo "$BREAKING_BODY" | sed 's/^/- /'
              echo ""
            fi

            FEATURES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- "${PATHS[@]}" | grep -E "^- feat" || true)
            if [ -n "$FEATURES" ]; then echo "### Features"; echo "$FEATURES"; echo ""; fi

            FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- "${PATHS[@]}" | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then echo "### Fixes"; echo "$FIXES"; echo ""; fi

            OTHER=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- "${PATHS[@]}" | grep -E "^- (docs|refactor|perf|style|build)" || true)
            if [ -n "$OTHER" ]; then echo "### Other"; echo "$OTHER"; echo ""; fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stamp plugin version + CHANGELOG
        if: steps.pluginbump.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.pluginbump.outputs.new_version }}
          CHANGELOG: ${{ steps.pluginlog.outputs.changelog }}
        run: |
          # plugin.json has one "version"; marketplace.json has two (top-level +
          # the plugins[] entry). A global replace stamps all of them.
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${NEW_VERSION}\"/g" plugins/funpack/.claude-plugin/plugin.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${NEW_VERSION}\"/g" .claude-plugin/marketplace.json
          CL=plugins/funpack/CHANGELOG.md
          [ -f "$CL" ] || printf '# Changelog\n\nAll notable changes to the funpack Claude Code plugin.\n\n' > "$CL"
          DATE=$(date -u +%Y-%m-%d)
          ENTRY=$(printf "## [%s] - %s\n\n%s" "$NEW_VERSION" "$DATE" "$CHANGELOG")
          INSERT_LINE=$(grep -n "^## \[" "$CL" | head -1 | cut -d: -f1)
          if [ -n "$INSERT_LINE" ]; then
            head -n $((INSERT_LINE - 1)) "$CL" > "$CL.tmp"
            printf '%s\n\n' "$ENTRY" >> "$CL.tmp"
            tail -n +"${INSERT_LINE}" "$CL" >> "$CL.tmp"
          else
            cp "$CL" "$CL.tmp"
            printf '\n%s\n' "$ENTRY" >> "$CL.tmp"
          fi
          cat -s "$CL.tmp" > "$CL"
          rm -f "$CL.tmp"

      # ---- Single atomic push of both lines ------------------------------------
      - name: Generate App token
        id: app-token
        # Only a real release pushes past the protected ruleset; a no-op run
        # (both lines skip) never needs the App secret.
        if: steps.binbump.outputs.skip != 'true' || steps.pluginbump.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Commit, tag, and push (both lines, one push)
        if: steps.binbump.outputs.skip != 'true' || steps.pluginbump.outputs.skip != 'true'
        env:
          BIN_SKIP: ${{ steps.binbump.outputs.skip }}
          BIN_VERSION: ${{ steps.binbump.outputs.new_version }}
          PLUGIN_SKIP: ${{ steps.pluginbump.outputs.skip }}
          PLUGIN_VERSION: ${{ steps.pluginbump.outputs.new_version }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"

          # Commit each non-skipped line in order (binary first, then plugin).
          # Track whether each commit actually landed so the post-rebase tagging
          # addresses the right commit even if a line's files were already current.
          BIN_COMMITTED=false
          if [ "$BIN_SKIP" != "true" ]; then
            # Stage the corpus restamp alongside VERSION so it rides this same
            # chore(release) commit (ADR 2026-06-19-corpus-regen-rides-version-bump).
            git add CHANGELOG.md VERSION cmd/funpack/mcp/corpus/manifest.json
            if ! git diff --cached --quiet; then
              git commit -m "chore(release): v${BIN_VERSION} [skip ci]"
              BIN_COMMITTED=true
            fi
          fi
          PLUGIN_COMMITTED=false
          if [ "$PLUGIN_SKIP" != "true" ]; then
            git add .claude-plugin/marketplace.json plugins/funpack/.claude-plugin/plugin.json plugins/funpack/CHANGELOG.md
            if ! git diff --cached --quiet; then
              git commit -m "chore(plugin-release): plugin-v${PLUGIN_VERSION} [skip ci]"
              PLUGIN_COMMITTED=true
            fi
          fi

          # Absorb anything that landed on main since checkout (rare — main pushes
          # serialize via the concurrency group; this only catches a direct human
          # push mid-run). Disjoint files -> clean rebase. Tag AFTER the rebase so
          # the tags point at the commits that actually land.
          git fetch origin main
          git rebase origin/main

          if [ "$BIN_COMMITTED" = true ] && [ "$PLUGIN_COMMITTED" = true ]; then
            git tag "v${BIN_VERSION}" HEAD~1
            git tag "plugin-v${PLUGIN_VERSION}" HEAD
          elif [ "$BIN_COMMITTED" = true ]; then
            git tag "v${BIN_VERSION}" HEAD
          elif [ "$PLUGIN_COMMITTED" = true ]; then
            git tag "plugin-v${PLUGIN_VERSION}" HEAD
          fi

          git push origin main --tags

      - name: Create binary GitHub release
        if: steps.binbump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.binbump.outputs.new_version }}
          name: v${{ steps.binbump.outputs.new_version }}
          body: ${{ steps.binlog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create plugin GitHub release
        if: steps.pluginbump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: plugin-v${{ steps.pluginbump.outputs.new_version }}
          name: plugin-v${{ steps.pluginbump.outputs.new_version }}
          body: ${{ steps.pluginlog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  build-binaries:
    name: build ${{ matrix.os }}-${{ matrix.arch }}
    needs: release
    if: needs.release.outputs.bin_skip != 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write   # attach assets to the release
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Intel macOS (macos-13 / x64) is intentionally omitted: GitHub's Intel
        # runners queue for hours, and Apple Silicon covers modern Macs.
        include:
          - { runner: ubuntu-latest,    os: linux, arch: x64 }
          - { runner: ubuntu-24.04-arm, os: linux, arch: arm64 }
          - { runner: macos-latest,     os: macos, arch: arm64 }
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the freshly-cut binary tag, not the main HEAD.
          ref: ${{ needs.release.outputs.bin_tag }}
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-05
      - name: Install SDL2 (the runtime links vendor:sdl2)
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y libsdl2-dev
          else
            brew install sdl2
          fi
      - name: Prepare Odin flake retry wrapper
        run: |
          cat > "$RUNNER_TEMP/retry-odin.sh" <<'SH'
          #!/usr/bin/env bash
          set -uo pipefail
          "$@"
          code=$?
          if [ "$code" -ne 133 ]; then exit "$code"; fi
          echo "::warning::odin exited 133 (known dev-2026-05 typechecker flake) - retrying once"
          exec "$@"
          SH
          chmod +x "$RUNNER_TEMP/retry-odin.sh"
      - name: Build funpack (single binary, compiler + runtime, FUNPACK_LIVE + SDL2)
        working-directory: cmd/funpack
        run: '"$RUNNER_TEMP/retry-odin.sh" odin build . -define:FUNPACK_LIVE=true -out:funpack'
      - name: Package
        env:
          TAG: ${{ needs.release.outputs.bin_tag }}
        run: |
          dist="funpack-${TAG}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$dist"
          cp cmd/funpack/funpack "$dist"/
          cp README.md LICENSE "$dist"/ 2>/dev/null || true
          tar -czf "${dist}.tar.gz" "$dist"
          echo "ASSET=${dist}.tar.gz" >> "$GITHUB_ENV"
      - name: Attach to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.bin_tag }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

  # After every platform tarball is attached, hash them and rewrite the Homebrew
  # formula (version + per-platform url/sha256) in mjmorales/homebrew-tap, pushing
  # the bump directly to its main. HOMEBREW_TAP_TOKEN is the fine-grained PAT
  # (managed in cloud-infra workflows.tf, shared with claude-env/keel).
  bump-tap:
    name: bump homebrew formula
    needs: [release, build-binaries]
    if: needs.release.outputs.bin_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version from the cut tag
        id: ver
        env:
          TAG: ${{ needs.release.outputs.bin_tag }}
        run: |
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"
      - name: Download release tarballs and hash them
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.bin_tag }}
        run: |
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p '*.tar.gz' -D dist
          for plat in macos-arm64 linux-arm64 linux-x64; do
            sha="$(sha256sum "dist/funpack-${TAG}-${plat}.tar.gz" | awk '{print $1}')"
            echo "${plat//-/_}=$sha" >> "$GITHUB_OUTPUT"
          done
      - name: Check out the Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: mjmorales/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Rewrite Formula/funpack.rb
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA_MAC_ARM: ${{ steps.sha.outputs.macos_arm64 }}
          SHA_LNX_ARM: ${{ steps.sha.outputs.linux_arm64 }}
          SHA_LNX_X64: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          ruby -e '
            f   = "tap/Formula/funpack.rb"
            s   = File.read(f)
            ver = ENV["VERSION"]; tag = ENV["TAG"]
            s.sub!(/version "[^"]*"/, %Q{version "#{ver}"})
            [
              ["macos-arm64", ENV["SHA_MAC_ARM"]],
              ["linux-arm64", ENV["SHA_LNX_ARM"]],
              ["linux-x64",   ENV["SHA_LNX_X64"]],
            ].each do |plat, sha|
              url = "https://github.com/mjmorales/funpack/releases/download/#{tag}/funpack-#{tag}-#{plat}.tar.gz"
              s.sub!(/url "[^"]*-#{plat}\.tar\.gz"(\s*\n\s*)sha256 "[0-9a-f]*"/m) { %Q{url "#{url}"#{$1}sha256 "#{sha}"} }
            end
            File.write(f, s)
          '
          git -C tap --no-pager diff
      - name: Commit and push the bump
        run: |
          cd tap
          if git diff --quiet; then
            echo "Formula already at this version; nothing to push."
            exit 0
          fi
          git config user.name "funpack-release"
          git config user.email "actions@users.noreply.github.com"
          git add Formula/funpack.rb
          git commit -m "funpack ${{ steps.ver.outputs.version }} (formula bump from ${{ steps.ver.outputs.tag }})"
          git push
