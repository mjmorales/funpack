version: '3'

# funpack-mcp — the Go MCP dev server. A SEPARATE Go module, never linked into
# the Odin engine. The root Taskfile aggregates these verbs under the `mcp:`
# namespace (`task mcp:build`, `task mcp:bundle`); `bundle` cross-compiles the
# per-platform release binaries into the funpack plugin's bin/ for the launcher
# wrapper to select at runtime. This module runs its own Go gates
# (gofmt/build/vet/test); the .claude/.prove.json validators stay pinned to the
# Odin root verbs, and bundling those binaries into the plugin RELEASE artifact
# is a separate release-workflow concern.

vars:
  BIN: bin/funpack-mcp
  PKG: ./...
  # Where `bundle` drops the per-platform release binaries: the committed plugin's
  # bin/ dir, beside the committed launcher wrapper. The wrapper selects
  # funpack-mcp-<os>-<arch> from here at runtime.
  BUNDLE_DIR: ../plugins/funpack/bin
  # buildinfo override paths — release binaries carry a real version; a bare
  # cross-compile would default to dev. Derived from git, with safe fallbacks so
  # the target runs off a tag, off a detached HEAD, or outside a checkout.
  # MATCH the funpack-mcp-v* tag family explicitly: the repo carries several tag
  # lines (funpack v*, plugin-v*, funpack-mcp-v*), and an unmatched `git describe`
  # stamps whichever tag is nearest — which is how a v0.3.0 build came to report
  # 0.2.1 in `health`. Strip the funpack-mcp-v prefix so health reports clean semver.
  BUNDLE_VERSION:
    sh: git describe --tags --match 'funpack-mcp-v*' --always --dirty 2>/dev/null | sed 's/^funpack-mcp-v//' || echo dev
  BUNDLE_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  BUNDLE_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  BUNDLE_LDFLAGS: >-
    -X github.com/mjmorales/funpack/mcp/internal/buildinfo.Version={{.BUNDLE_VERSION}}
    -X github.com/mjmorales/funpack/mcp/internal/buildinfo.Commit={{.BUNDLE_COMMIT}}
    -X github.com/mjmorales/funpack/mcp/internal/buildinfo.Date={{.BUNDLE_DATE}}

tasks:
  build:
    desc: Compile funpack-mcp to bin/funpack-mcp
    cmds:
      - go build -o {{.BIN}} .

  bundle:
    desc: >-
      Cross-compile funpack-mcp for darwin/arm64, darwin/amd64, linux/amd64, and
      linux/arm64 into ../plugins/funpack/bin/funpack-mcp-<os>-<arch>, each stamped
      with the version ldflags (git describe). These per-platform binaries are
      gitignored and selected at runtime by the committed bin/funpack-mcp launcher.
      Pure-Go (CGO_ENABLED=0) so the cross-compiles are hermetic.
    cmds:
      - mkdir -p {{.BUNDLE_DIR}}
      - for: [darwin/arm64, darwin/amd64, linux/amd64, linux/arm64]
        cmd: |
          target='{{.ITEM}}'
          os="${target%/*}"; arch="${target#*/}"
          out="{{.BUNDLE_DIR}}/funpack-mcp-${os}-${arch}"
          echo "bundling $out"
          CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
            go build -ldflags "{{.BUNDLE_LDFLAGS}}" -o "$out" .

  run:
    desc: Run the MCP server over stdio (serve)
    cmds:
      - go run . serve

  test:
    desc: Run the Go test suite
    cmds:
      - go test {{.PKG}}

  lint:
    desc: go vet the module
    cmds:
      - go vet {{.PKG}}

  docs-regen:
    desc: Regenerate the committed docs corpus (internal/docs/corpus + manifest.json) from the in-repo spec/ + stdlib/
    cmds:
      - go run ./internal/docs/gen
    env:
      # The spec/ + stdlib/ trees now live in-repo at the monorepo root. Passed
      # through from the caller's environment; when unset (empty), the generator
      # defaults to the repo root.
      FUNPACK_SPEC_DIR: '{{.FUNPACK_SPEC_DIR}}'

  docs-check:
    desc: >-
      Fail if the committed docs corpus has drifted from the in-repo spec/ +
      stdlib/. Regenerates in memory through the same generator and byte/hash-compares
      against the committed snapshot. Skips cleanly (PASS) when FUNPACK_SPEC_DIR /
      the spec tree is absent, so it is hermetic off-spec. The CI
      invocation that runs this is wired separately by
      cloud-infra (it tofu-pushes .github/); this target is the in-repo check logic.
    cmds:
      - go test ./internal/docs/ -run 'CorpusPin|MutatedManifest' -count=1
    env:
      FUNPACK_SPEC_DIR: '{{.FUNPACK_SPEC_DIR}}'

  tidy:
    desc: Tidy and verify module dependencies
    cmds:
      - go mod tidy

  fmt:
    desc: gofmt the module in place
    cmds:
      - gofmt -l -w .

  contract-gen:
    desc: >-
      Regenerate the Go side of the funpack<->MCP API contract
      (internal/contract/contract_gen.go) from contract/funpack-api.json. The
      Odin side is NOT emitted here — it is generated by the funpack-team codegen
      task, which runs the same generator with `-odin-out <funpack/path>`.
    cmds:
      - go run ./internal/contract/gen
