version: '3'

# funpack-mcp — the Go MCP dev server. A SEPARATE Go module, never linked into
# the Odin engine. Standalone for now: root-Taskfile aggregation, the per-arch
# release line, and CI land under the mcp-distribution epic (t-task-build,
# s-release-line). Validators in .claude/.prove.json stay pinned to the Odin root
# verbs until that integration task wires these in deliberately.

vars:
  BIN: bin/funpack-mcp
  PKG: ./...

tasks:
  build:
    desc: Compile funpack-mcp to bin/funpack-mcp
    cmds:
      - go build -o {{.BIN}} .

  run:
    desc: Run the MCP server over stdio (serve)
    cmds:
      - go run . serve

  test:
    desc: Run the Go test suite
    cmds:
      - go test {{.PKG}}

  lint:
    desc: go vet the module
    cmds:
      - go vet {{.PKG}}

  docs-regen:
    desc: Regenerate the committed docs corpus (internal/docs/corpus + manifest.json) from funpack-spec
    cmds:
      - go run ./internal/docs/gen
    env:
      # Sibling funpack-spec repo. Passed through from the caller's environment;
      # when unset (empty), the generator defaults to ../funpack-spec.
      FUNPACK_SPEC_DIR: '{{.FUNPACK_SPEC_DIR}}'

  docs-check:
    desc: >-
      Fail if the committed docs corpus has drifted from the pinned funpack-spec
      ref. Regenerates in memory through the same generator and byte/hash-compares
      against the committed snapshot. Skips cleanly (PASS) when FUNPACK_SPEC_DIR /
      the sibling spec checkout is absent, so it is hermetic off-spec. The CI
      invocation that pins the spec ref and runs this is wired separately by
      cloud-infra (it tofu-pushes .github/); this target is the in-repo check logic.
    cmds:
      - go test ./internal/docs/ -run 'CorpusPin|MutatedManifest' -count=1
    env:
      FUNPACK_SPEC_DIR: '{{.FUNPACK_SPEC_DIR}}'

  tidy:
    desc: Tidy and verify module dependencies
    cmds:
      - go mod tidy

  fmt:
    desc: gofmt the module in place
    cmds:
      - gofmt -l -w .

  contract-gen:
    desc: >-
      Regenerate the Go side of the funpack<->MCP API contract
      (internal/contract/contract_gen.go) from contract/funpack-api.json. The
      Odin side is NOT emitted here — it is generated by the funpack-team codegen
      task, which runs the same generator with `-odin-out <funpack/path>`.
    cmds:
      - go run ./internal/contract/gen
