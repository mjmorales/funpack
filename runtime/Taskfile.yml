version: '3'

includes:
  base:
    taskfile: ../taskfiles/odin.yml
    flatten: true

tasks:
  # lint-live type-checks the FUNPACK_LIVE-gated code the define-free default lint
  # never compiles, so CI can catch when-gated rot in the live SDL block. The
  # runtime is now a LIBRARY (no main — the single binary lives in cmd/funpack), so
  # this check passes -no-entry-point like the shared verbs. Type-checking the SDL
  # arm does NOT link vendor:sdl2's native lib, so it needs no SDL2 installed.
  # The runtime is a library — it builds no standalone binary. The one consolidated
  # binary is built by `task cmd:binary` (or `task binary` at the root); play it with
  # `funpack run` / `funpack live <artifact>`.
  lint-live:
    desc: Vet the FUNPACK_LIVE-gated runtime with strict style
    cmds:
      - odin check . -vet -strict-style -define:FUNPACK_LIVE=true -no-entry-point
