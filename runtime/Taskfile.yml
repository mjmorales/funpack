version: '3'

includes:
  base:
    taskfile: ../taskfiles/odin.yml
    flatten: true

tasks:
  # lint-live type-checks the FUNPACK_LIVE-gated code the define-free default lint
  # never compiles, so CI can catch when-gated rot in the live SDL block. The
  # runtime is now a LIBRARY (no main — the single binary lives in cmd/funpack), so
  # this check passes -no-entry-point like the shared verbs. Type-checking the SDL
  # arm does NOT link vendor:sdl2's native lib, so it needs no SDL2 installed.
  # The runtime is a library — it builds no standalone binary. The one consolidated
  # binary is built by `task cmd:binary` (or `task binary` at the root); play it with
  # `funpack run` / `funpack live <artifact>`.
  lint-live:
    desc: Vet the FUNPACK_LIVE-gated runtime with strict style
    cmds:
      # ODIN_THREADS (the core:os Queue(string) single-thread pin) is inherited from
      # the flatten-included taskfiles/odin.yml; see its rationale block.
      - odin check . -vet -strict-style -define:FUNPACK_LIVE=true -no-entry-point {{.ODIN_THREADS}}

  # test-live RUNS the FUNPACK_LIVE-gated suite, including the headless offscreen
  # screenshot capture proof (when #config(FUNPACK_LIVE) tests in session_live_test.odin).
  # This LINKS vendor:sdl2's native lib (unlike lint-live, which only type-checks), so SDL2
  # must be installed — the capture test drives the real software renderer headless via the
  # dummy video driver. Deliberately NOT folded into the repo-root define-free `test`
  # composition: the default suite stays SDL-free and deterministic; the driver wires any
  # top-level/CI hook for this separately.
  test-live:
    desc: Run the FUNPACK_LIVE-gated runtime suite (headless offscreen capture proof)
    cmds:
      - odin test . -define:FUNPACK_LIVE=true {{.ODIN_THREADS}}
