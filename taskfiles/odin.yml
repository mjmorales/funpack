version: '3'

# Shared Odin verbs. Embedded projects inherit these by flatten-including
# this file from their own Taskfile:
#
#   includes:
#     base:
#       taskfile: ../taskfiles/odin.yml
#       flatten: true
#
# Override a verb by excluding it from the include (excludes: [test]) and
# redefining it locally. ODIN/ODIN_PKG use the default pattern so including
# Taskfiles can override them via the include's vars block. Var names are
# toolchain-prefixed: the root Taskfile merges every base's top-level vars
# into one global scope, so unprefixed names collide across odin.yml/go.yml.

vars:
  ODIN: '{{.ODIN | default "odin"}}'
  ODIN_PKG: '{{.ODIN_PKG | default "."}}'

tasks:
  build:
    desc: Type-check the package without codegen
    cmds:
      - '{{.ODIN}} check {{.ODIN_PKG}}'

  lint:
    desc: Type-check with vet and strict style
    cmds:
      - '{{.ODIN}} check {{.ODIN_PKG}} -vet -strict-style'

  test:
    desc: Run the package test runner
    cmds:
      - '{{.ODIN}} test {{.ODIN_PKG}}'
