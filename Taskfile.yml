version: '3'

# Monorepo build orchestration. Each embedded project (funpack, warden,
# runtime) owns its Taskfile, which flatten-includes taskfiles/odin.yml
# for the shared Odin verbs; this root file composes them by namespace
# and each root verb aggregates the per-project ones. Validators in
# .claude/.prove.json pin to the root verbs, so layout changes edit this
# file only — never the validator config.

includes:
  funpack:
    taskfile: ./funpack
    dir: ./funpack
  warden:
    taskfile: ./warden
    dir: ./warden
  runtime:
    taskfile: ./runtime
    dir: ./runtime

tasks:
  build:
    desc: Type-check every embedded project
    cmds:
      - task: funpack:build
      - task: warden:build
      - task: runtime:build

  lint:
    desc: Vet + strict-style check every embedded project
    cmds:
      - task: funpack:lint
      - task: warden:lint
      - task: runtime:lint

  test:
    desc: Run every embedded project's tests
    cmds:
      - task: funpack:test
      - task: warden:test
      - task: runtime:test
